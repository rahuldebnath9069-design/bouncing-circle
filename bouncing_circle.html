<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Circle — Growth Simulation</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    h1 {
      color: #e0e0ff;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: .06em;
      margin-bottom: 18px;
      text-shadow: 0 0 20px rgba(120, 140, 255, .45);
    }

    canvas {
      border-radius: 50%;
      box-shadow:
        0 0 30px rgba(80, 120, 255, .25),
        0 0 80px rgba(80, 120, 255, .08),
        inset 0 0 60px rgba(0, 0, 0, .6);
    }

    #stats {
      margin-top: 20px;
      display: flex;
      gap: 32px;
      color: #8892b0;
      font-size: .85rem;
      letter-spacing: .04em;
    }

    #stats span {
      color: #64ffda;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <h1>⬤ BOUNCING GROWTH</h1>
  <canvas id="canvas"></canvas>
  <div id="stats">
    <div>Radius: <span id="sRadius">6</span></div>
    <div>Speed: <span id="sSpeed">0</span></div>
    <div>Bounces: <span id="sBounces">0</span></div>
    <div>Fill: <span id="sFill">0%</span></div>
  </div>

  <script>
    (() => {
      /* ── Setup ──────────────────────────────────────────────── */
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const SIZE = Math.min(window.innerWidth, window.innerHeight) * 0.72 | 0;
      canvas.width = SIZE;
      canvas.height = SIZE;

      const CENTER = SIZE / 2;
      const CONTAINER_R = SIZE / 2 - 4;            // visual container radius

      /* ── Inner circle state ─────────────────────────────────── */
      let r = 6;                               // starting radius
      const INITIAL_SPEED = 4.5;
      let angle = Math.random() * Math.PI * 2;
      let speed = INITIAL_SPEED;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;
      let cx = CENTER;
      let cy = CENTER;
      let bounces = 0;
      let filled = false;

      /* Growth / acceleration tunables */
      const RADIUS_GROW = 1.4;                     // px added per bounce
      const SPEED_FACTOR = 1.025;                   // multiplier per bounce

      /* Trail history for comet-tail effect */
      const TRAIL_LEN = 28;
      const trail = [];

      /* Collision flash */
      let flashAlpha = 0;

      /* Palette */
      const hueStart = 180;                          // cyan-ish
      let hue = hueStart;

      /* HUD elements */
      const elR = document.getElementById('sRadius');
      const elS = document.getElementById('sSpeed');
      const elB = document.getElementById('sBounces');
      const elF = document.getElementById('sFill');

      /* ── Helpers ────────────────────────────────────────────── */
      function clampRadius() {
        if (r >= CONTAINER_R) {
          r = CONTAINER_R;
          vx = 0;
          vy = 0;
          filled = true;
        }
      }

      /* ── Draw ───────────────────────────────────────────────── */
      function drawContainer() {
        /* Outer ring glow */
        const grd = ctx.createRadialGradient(CENTER, CENTER, CONTAINER_R - 6,
          CENTER, CENTER, CONTAINER_R + 6);
        grd.addColorStop(0, 'rgba(100,255,218, .12)');
        grd.addColorStop(1, 'rgba(100,255,218, 0)');
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, CONTAINER_R + 6, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        /* Ring stroke */
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, CONTAINER_R, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(100,255,218, .35)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function drawTrail() {
        for (let i = 0; i < trail.length; i++) {
          const t = trail[i];
          const ratio = i / trail.length;
          const alpha = ratio * 0.45;
          const tr = r * ratio * 0.55;
          ctx.beginPath();
          ctx.arc(t.x, t.y, Math.max(1, tr), 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${hue}, 100%, 65%, ${alpha})`;
          ctx.fill();
        }
      }

      function drawBall() {
        /* Soft outer glow */
        const glowR = r * 2.2;
        const grd = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, glowR);
        grd.addColorStop(0, `hsla(${hue}, 100%, 70%, .35)`);
        grd.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);
        ctx.beginPath();
        ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        /* Main circle */
        const inner = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3,
          r * 0.1, cx, cy, r);
        inner.addColorStop(0, `hsla(${hue}, 100%, 85%, .95)`);
        inner.addColorStop(0.6, `hsla(${hue}, 100%, 60%, .9)`);
        inner.addColorStop(1, `hsla(${hue}, 80%, 40%, .85)`);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = inner;
        ctx.fill();

        /* Specular highlight */
        const spec = ctx.createRadialGradient(cx - r * 0.28, cy - r * 0.28,
          r * 0.05, cx, cy, r * 0.7);
        spec.addColorStop(0, 'rgba(255,255,255,.45)');
        spec.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = spec;
        ctx.fill();
      }

      function drawFlash() {
        if (flashAlpha <= 0) return;
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, CONTAINER_R, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100, 255, 218, ${flashAlpha})`;
        ctx.fill();
        flashAlpha -= 0.035;
        if (flashAlpha < 0) flashAlpha = 0;
      }

      function drawFilledState() {
        /* Pulsing full-fill */
        const pulse = Math.sin(Date.now() / 400) * 0.08 + 0.88;
        const grd = ctx.createRadialGradient(CENTER - r * 0.2, CENTER - r * 0.2,
          r * 0.05, CENTER, CENTER, r);
        grd.addColorStop(0, `hsla(${hue}, 100%, 82%, ${pulse})`);
        grd.addColorStop(0.5, `hsla(${hue}, 90%, 55%, ${pulse * 0.9})`);
        grd.addColorStop(1, `hsla(${hue}, 70%, 30%, ${pulse * 0.8})`);
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, r, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        /* Label */
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${SIZE * 0.06 | 0}px "Segoe UI", system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,.6)';
        ctx.shadowBlur = 12;
        ctx.fillText('FILLED', CENTER, CENTER - 14);
        ctx.font = `${SIZE * 0.03 | 0}px "Segoe UI", system-ui, sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,.7)';
        ctx.fillText(`${bounces} bounces`, CENTER, CENTER + 22);
        ctx.shadowBlur = 0;
      }

      /* ── Physics step ───────────────────────────────────────── */
      function step() {
        if (filled) return;

        cx += vx;
        cy += vy;

        /* Distance from container centre to ball centre */
        const dx = cx - CENTER;
        const dy = cy - CENTER;
        const dist = Math.sqrt(dx * dx + dy * dy);

        /* Available room: ball edge must stay inside container */
        const maxDist = CONTAINER_R - r;

        if (dist >= maxDist && maxDist > 0) {
          /* ── Bounce ─────────────────────────────────────────── */
          bounces++;

          /* Push ball back to boundary */
          const nx = dx / dist;
          const ny = dy / dist;
          cx = CENTER + nx * maxDist;
          cy = CENTER + ny * maxDist;

          /* Reflect velocity across the collision normal */
          const dot = vx * nx + vy * ny;
          vx -= 2 * dot * nx;
          vy -= 2 * dot * ny;

          /* Grow & accelerate */
          r += RADIUS_GROW;
          speed *= SPEED_FACTOR;
          const mag = Math.sqrt(vx * vx + vy * vy);
          if (mag > 0) {
            vx = (vx / mag) * speed;
            vy = (vy / mag) * speed;
          }

          /* Shift hue */
          hue = (hueStart + bounces * 7) % 360;

          /* Flash on hit */
          flashAlpha = 0.18;

          clampRadius();
        }

        /* Safety: if the ball is somehow larger than room, centre & stop */
        if (CONTAINER_R - r <= 0) {
          cx = CENTER;
          cy = CENTER;
          r = CONTAINER_R;
          filled = true;
        }

        /* Trail */
        trail.push({ x: cx, y: cy });
        if (trail.length > TRAIL_LEN) trail.shift();
      }

      /* ── HUD update ─────────────────────────────────────────── */
      function updateHUD() {
        elR.textContent = r.toFixed(1);
        elS.textContent = speed.toFixed(1);
        elB.textContent = bounces;
        const pct = Math.min(100, (r / CONTAINER_R * 100)).toFixed(1);
        elF.textContent = pct + '%';
      }

      /* ── Main loop ──────────────────────────────────────────── */
      function frame() {
        ctx.clearRect(0, 0, SIZE, SIZE);

        step();
        drawContainer();
        drawFlash();

        if (filled) {
          drawFilledState();
        } else {
          drawTrail();
          drawBall();
        }

        updateHUD();
        requestAnimationFrame(frame);
      }

      frame();
    })();
  </script>
</body>

</html>
